name: Branch Build

on:
  push:
    branches:
      - feat/main/screencapturer
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win-x86
            artifact_name: cherry-studio-win-x86-${{ github.ref_name }}-${{ github.sha }}
          - os: macos-latest
            target: mac-arm64
            artifact_name: cherry-studio-mac-arm64-${{ github.ref_name }}-${{ github.sha }}

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NODE_OPTIONS: --max-old-space-size=8192
      MAIN_VITE_CHERRYAI_CLIENT_SECRET: ${{ secrets.MAIN_VITE_CHERRYAI_CLIENT_SECRET }}
      MAIN_VITE_MINERU_API_KEY: ${{ secrets.MAIN_VITE_MINERU_API_KEY }}
      RENDERER_VITE_AIHUBMIX_SECRET: ${{ secrets.RENDERER_VITE_AIHUBMIX_SECRET }}
      RENDERER_VITE_PPIO_APP_SECRET: ${{ secrets.RENDERER_VITE_PPIO_APP_SECRET }}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - name: macOS dependencies fix
        if: matrix.os == 'macos-latest'
        run: |
          brew install python-setuptools

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install Dependencies
        run: pnpm install

      - name: Build Windows x86
        if: matrix.target == 'win-x86'
        shell: bash
        run: |
          dotenv npm run build && electron-builder --win --ia32

      - name: Build macOS arm64
        if: matrix.target == 'mac-arm64'
        shell: bash
        run: |
          sudo -H pip install setuptools
          pnpm build:mac:arm64

      - name: Upload Windows x86 artifacts
        if: matrix.target == 'win-x86'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*-ia32-setup.exe
            dist/*-ia32-portable.exe
            dist/latest*.yml
            dist/*.blockmap
          retention-days: 7

      - name: Upload macOS arm64 artifacts
        if: matrix.target == 'mac-arm64'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*-arm64.dmg
            dist/*-arm64.zip
            dist/latest*.yml
            dist/*.blockmap
          retention-days: 7
